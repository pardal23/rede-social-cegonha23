const print = (...args) => {
  const logger = document.getElementById('log-terminal');
  
  const output = args.map(arg => {
    // Se for BigInt, converte para String (porque JSON.stringify não gosta de BigInt)
    if (typeof arg === 'bigint') return arg.toString();
    if (typeof arg === 'object') return `<pre>${JSON.stringify(arg, null, 2)}</pre>`;
    return arg;
  }).join(' ');

  logger.innerHTML += `<div style="margin-bottom: 10px; word-wrap: break-word;">${output}</div>`;
};
