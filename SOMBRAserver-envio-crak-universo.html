<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #0f0; padding: 20px; background: #050505; width: 350px; position: relative; }
        input { background: #000; border: 1px solid #060; color: #0f0; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        #status { font-size: 10px; color: #060; height: 20px; overflow: hidden; }
        .ghost { position: absolute; top: -20px; right: 0; font-size: 10px; }
    </style>
</head>
<body>

<div class="box">
    <div class="ghost">v2223_SHADOW</div>
    <label>LINK PAI:</label>
    <input type="text" id="parent-url" placeholder="https://webhook.site...">
    <label>MENSAGEM:</label>
    <input type="text" id="raw-data" placeholder="Escreve e prime Enter...">
    <div id="status">> Sistema pronto.</div>
</div>

<script>
    const shadowCore = {
        obfuscate(text) {
            return btoa(unescape(encodeURIComponent(text)));
        },

        async ascend() {
            const target = document.getElementById('parent-url').value;
            const inputField = document.getElementById('raw-data');
            const status = document.getElementById('status');
            const data = inputField.value;

            if (!target || !data) return;

            const payload = this.obfuscate(data);
            status.innerText = `> Transmitindo: ${payload.substring(0, 10)}...`;

            try {
                await fetch(target, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ shadow: payload, entropy: Math.random() })
                });
                
                status.innerText = "> SUCESSO: Mensagem no Link Pai.";
                inputField.value = ''; // Limpa a caixa
                
                // Auto-destruição do status após 5 segundos
                setTimeout(() => { status.innerText = "> Aguardando instrução..."; }, 5000);
            } catch (e) {
                status.innerText = "> FALHA NO TÚNEL.";
            }
        }
    };

    // Escuta a tecla ENTER em qualquer lugar da página
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            shadowCore.ascend();
        }
    });
</script>
</body>
</html>
