<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>CEGONHA 23 | REDE SOCIAL QUÂNTICA</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #top-bar { background: #010; border-bottom: 2px solid #0f0; padding: 10px; display: flex; gap: 10px; align-items: center; z-index: 999; }
        input, textarea { background: #000; border: 1px solid #0f0; color: #0f0; padding: 5px; font-family: 'Courier New'; outline: none; }
        .btn { background: #000; border: 1px solid #0f0; color: #0f0; padding: 8px 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .spirit-link { color: #0af; text-decoration: none; font-size: 11px; font-weight: bold; border: 1px solid #0af; padding: 5px; cursor: pointer; }
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        #editor-container { width: 400px; border-right: 1px solid #0f0; display: none; flex-direction: column; background: #001a00; }
        #code-editor { flex-grow: 1; width: 100%; resize: none; border: none; background: #000; color: #0f0; padding: 15px; font-size: 13px; line-height: 1.5; }
        #viewport { flex-grow: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }
        #status-bar { position: absolute; bottom: 5px; right: 10px; font-size: 9px; color: #0f0; opacity: 0.8; background: #000; padding: 2px 5px; pointer-events: none; }
        .exec-btn { background: #0af; color: #000; width: 100%; border: none; padding: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-bottom: 1px solid #000; }
        .clear-btn { background: #500; color: #fff; width: 100%; border: none; padding: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .clear-btn:hover { background: #f00; }
    </style>
</head>
<body>

    <div id="top-bar">
        <input type="text" id="url-input" placeholder="URL ALVO">
        <input type="password" id="pass-input" placeholder="SENHA">
        <button class="btn" onclick="lancarTunel()">ABRIR EM TÚNEL</button>
        <button class="btn" style="border-color:#0af; color:#0af" onclick="toggleEditor()">PROGRAMAÇÃO GÉMEA</button>
        <a id="net-link" class="spirit-link" onclick="gerarSuperLink()">⚡ GERAR LINK REAL VITALÍCIO</a>
        <button class="btn" style="border-color:#f00; color:#f00; margin-left:auto;" onclick="autoDestruicao()">PURGA ⚡</button>
    </div>

    <div id="main-container">
        <div id="editor-container">
            <div style="padding:8px; font-size:10px; background:#0af; color:#000; font-weight:bold;">EMISSOR QUÂNTICO</div>
            <textarea id="code-editor" placeholder="<h1>Olá Mundo</h1>"></textarea>
            <button class="exec-btn" onclick="projetar()">Executar Comando & Sincronizar ⚡</button>
            <button class="clear-btn" onclick="limparEmissao()">Limpar Programação Gémea 🧹</button>
        </div>
        <div id="viewport">
            <iframe id="portal"></iframe>
            <div id="status-bar">DNS: MASCARADO | IP: QUÂNTICO | CEGONHA 23</div>
        </div>
    </div>

    <script>
        const _C = "32ahnogec"; 
        const canal = new BroadcastChannel('cegonha_core');

        function mascararConexao() {
            const ips = ["192.168.23.1", "10.0.0.23", "200.15.2.23", "172.16.23.254"];
            const ipSorteado = ips[Math.floor(Math.random() * ips.length)];
            document.getElementById('status-bar').innerText = `DNS: REDIRECIONADO | IP: ${ipSorteado} | TRANSMISSÃO GÉMEA`;
        }

        function projetar(origemExterna = false, conteudo = null) {
            const editor = document.getElementById('code-editor');
            const iframe = document.getElementById('portal');
            const codigo = conteudo !== null ? conteudo : editor.value;

            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(codigo);
                doc.close();
                mascararConexao();
            } catch (e) { console.error("Erro na renderização."); }

            if (!origemExterna) {
                canal.postMessage({type: 'render', data: codigo});
                localStorage.setItem('cegonha_viva', codigo);
            }
        }

        function limparEmissao() {
            if(confirm("LIMPAR TODA A PROGRAMAÇÃO GÉMEA ATIVA?")) {
                document.getElementById('code-editor').value = "";
                projetar(false, " "); // Limpa o iframe local e envia comando
                localStorage.removeItem('cegonha_viva');
                canal.postMessage({type: 'clear'});
            }
        }

        function lancarTunel() {
            const url = document.getElementById('url-input').value;
            const pass = document.getElementById('pass-input').value;
            if (pass.split("").reverse().join("") !== _C) { autoDestruicao(true); return; }
            if (!url) return;
            const link = url.startsWith('http') ? url : 'https://' + url;
            mascararConexao();
            window.open(link, "CanalPrivado", "width=1100,height=800");
            document.getElementById('portal').src = link;
        }

        function gerarSuperLink() {
            const htmlAtual = document.documentElement.outerHTML;
            const blob = new Blob([htmlAtual], {type: 'text/html'});
            const reader = new FileReader();
            reader.onload = function(e) {
                navigator.clipboard.writeText(e.target.result);
                alert("LINK VITALÍCIO COPIADO!");
            };
            reader.readAsDataURL(blob);
        }

        function toggleEditor() {
            const ed = document.getElementById('editor-container');
            ed.style.display = ed.style.display === 'none' ? 'flex' : 'none';
        }

        canal.onmessage = (e) => {
            if (e.data.type === 'render') {
                document.getElementById('code-editor').value = e.data.data;
                setTimeout(() => projetar(true, e.data.data), 50);
            } else if (e.data.type === 'clear') {
                document.getElementById('code-editor').value = "";
                projetar(true, " ");
            }
        };

        function autoDestruicao(s = false) {
            if (s || confirm("APAGAR RASTOS?")) {
                localStorage.clear();
                window.location.replace("https://www.google.com");
            }
        }

        window.onload = () => {
            mascararConexao();
            const backup = localStorage.getItem('cegonha_viva');
            if(backup) {
                document.getElementById('code-editor').value = backup;
                setTimeout(() => projetar(true, backup), 100);
            }
        };
    </script>
</body>
</html>
